spring.application.name=product-service
server.port = 8082

spring.datasource.url=jdbc:mysql://localhost:3306/dwb_20262
spring.datasource.username=root
spring.datasource.password=EstaNoLaSubas
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver

# carpeta de archivos
app.upload.dir=uploads
app.upload.images=img

# Swagger
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.doc-expansion=none

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Exponer endpoints actuator
management.endpoints.web.exposure.include=health,info,metrics,loggers,threaddump,heapdump

# Mostrar detalles de health
management.endpoint.health.show-details=always

# Instancia en eureka por hostname
eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

